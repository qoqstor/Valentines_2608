<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💌 匿名情人節告白信牆</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body {
    height:100%; overflow:hidden;
    font-family: "PingFang TC","Microsoft JhengHei",sans-serif;
    background: radial-gradient(ellipse at 50% 20%, #2b1055 0%, #10042e 55%, #05010f 100%);
  }
  body { position:relative; }
  .stars { position:absolute; inset:0; overflow:hidden; }
  .star { position:absolute; width:2px; height:2px; background:#fff; border-radius:50%; animation: twinkle 3s infinite ease-in-out; opacity:0.6; }
  @keyframes twinkle { 0%,100%{opacity:0.2;} 50%{opacity:1;} }
  .heart { position:absolute; bottom:-40px; font-size:20px; opacity:0.8; animation: floatUp linear infinite; filter: drop-shadow(0 0 4px rgba(255,120,170,0.8)); }
  @keyframes floatUp { 0%{transform:translateY(0) translateX(0) rotate(0deg);opacity:0;} 10%{opacity:0.9;} 100%{transform:translateY(-110vh) translateX(20px) rotate(25deg);opacity:0;} }
  .scene { position:relative; height:100%; display:flex; align-items:center; justify-content:center; flex-direction:column; z-index:2; padding-bottom:50px; }
  .title { position:fixed; top:18px; left:0; right:0; text-align:center; color:#ffdce9; letter-spacing:4px; font-size:15px; z-index:3; opacity:0.85;}
  .countdown { position:fixed; top:42px; left:0; right:0; text-align:center; color:#c9a8ff; letter-spacing:2px; font-size:12px; z-index:3; opacity:0.9; text-shadow:0 0 8px rgba(201,168,255,0.5); }
  .envelope-wrap { text-align:center; cursor:pointer; user-select:none; }
  .envelope { position:relative; width:230px; height:150px; margin:0 auto; filter: drop-shadow(0 10px 25px rgba(255,70,130,0.35)); transition: transform 0.4s; }
  .envelope-wrap:hover .envelope { transform: translateY(-6px) scale(1.02); }
  .env-back { position:absolute; inset:0; border-radius:10px; background: linear-gradient(145deg, #ffd9e6, #ffb6c9); box-shadow: inset 0 0 0 2px rgba(255,255,255,0.4); }
  .env-flap { position:absolute; top:0; left:0; width:0; height:0; border-left:115px solid transparent; border-right:115px solid transparent; border-top:75px solid #ff8fab; transform-origin: top center; }
  .env-heart-seal { position:absolute; top:52px; left:50%; transform:translateX(-50%); font-size:24px; z-index:4; filter: drop-shadow(0 2px 3px rgba(0,0,0,0.25)); }
  .hint { margin-top:20px; color:#ffdce9; font-size:14px; letter-spacing:2px; animation: pulse 1.8s infinite ease-in-out; }
  @keyframes pulse { 0%,100%{opacity:0.6;} 50%{opacity:1;} }
  .count-tag { margin-top:8px; color:#c9a6c2; font-size:12px; cursor:pointer; text-decoration:underline dotted; }
  .count-tag:hover { color:#ffdce9; }
  /* 【v13】投稿清單 */
  .letters-list-box { width:min(420px,90vw); max-height:75vh; background:#fff8ef; border-radius:14px; padding:20px; box-shadow:0 20px 50px rgba(0,0,0,0.4); display:flex; flex-direction:column; }
  .letters-list-box h3 { color:#e8608a; font-size:16px; margin-bottom:12px; flex:none; }
  .letters-list-body { overflow-y:auto; flex:1; }
  .letter-row { padding:10px 6px; border-bottom:1px dashed #eddcc9; cursor:pointer; font-size:14px; color:#5a4634; display:flex; align-items:center; gap:8px; }
  .letter-row:hover { background:#fff0e6; }
  .letter-row .lr-label { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .letter-row .lr-to { flex:none; font-size:11px; color:#b98a63; background:#f6efe4; padding:2px 8px; border-radius:8px; max-width:35%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .letters-list-close { margin-top:12px; flex:none; align-self:flex-end; background:#eee; color:#777; border:none; padding:8px 16px; border-radius:8px; font-size:13px; cursor:pointer; }
  .mini-envelope { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:120px; height:80px; z-index:20; pointer-events:none; opacity:0; transition: opacity 0.3s; }
  .mini-envelope.active { opacity:1; }
  .mini-env-back { position:absolute; inset:0; border-radius:8px; background: linear-gradient(145deg,#ffd9e6,#ffb6c9); }
  .mini-env-flap { position:absolute; top:0; left:0; width:0; height:0; border-left:60px solid transparent; border-right:60px solid transparent; border-top:40px solid #ff8fab; transform-origin: top center; transition: transform 0.7s cubic-bezier(.6,-0.28,.74,.05); }
  .mini-env-flap.open { transform: rotateX(180deg); }
  .letter-paper {
    position:fixed; top:50%; left:50%; transform: translate(-50%,-42%) scale(0.9); width:min(440px, 88vw); max-height:80vh; overflow-y:auto;
    background: linear-gradient(180deg,#fffdf7,#fff6ea); border-radius:14px; padding:34px 28px 30px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.5) inset;
    opacity:0; pointer-events:none; transition: opacity 0.5s ease, transform 0.5s ease; z-index:15;
  }
  .letter-paper.show { opacity:1; transform: translate(-50%,-50%) scale(1); pointer-events:auto; }
  .letter-paper .tag { display:inline-block; font-size:11px; padding:3px 10px; border-radius:10px; margin-bottom:10px; }
  .tag.user { background:#ffe1ec; color:#e8608a; }
  .tag.system { background:#eee; color:#888; }
  .tag.voice { background:#ece1ff; color:#8a63e8; }
  .recipient-line { font-size:12.5px; color:#b98a63; margin-bottom:12px; }
  .paper-content { color:#5a4634; font-size:15.5px; line-height:1.85; white-space:pre-wrap; min-height:80px; }
  .cursor { display:inline-block; color:#e8608a; animation: blink 0.8s infinite; }
  @keyframes blink { 50% { opacity:0; } }
  .close-btn { position:absolute; top:10px; right:14px; background:none; border:none; font-size:18px; color:#c98; cursor:pointer; }
  .audio-player { margin-top:14px; display:flex; align-items:center; gap:10px; background:#f6efe4; padding:10px 12px; border-radius:10px; }
  .audio-player audio { flex:1; height:32px; }
  .anon-heading { font-size:17px; color:#8a63e8; margin-bottom:10px; }
  .guess-box { margin-top:22px; border-top:1px dashed #e5d3c0; padding-top:16px; opacity:0; transition: opacity 0.6s ease; }
  .guess-box.show { opacity:1; }
  .guess-box h4 { color:#e8608a; font-size:14px; margin-bottom:10px; }
  .guess-status { font-size:12px; color:#a98; margin-bottom:10px; }
  .guess-row { display:flex; gap:8px; margin-bottom:10px; }
  .guess-row input { flex:1; padding:8px 10px; border-radius:8px; border:1px solid #eddcc9; font-size:14px; }
  .guess-row input:disabled { background:#f2ede4; color:#b9a58f; }
  .guess-row button { background:#ff8fab; border:none; color:#fff; padding:8px 14px; border-radius:8px; font-size:13px; cursor:pointer; }
  .guess-row button:disabled { background:#e6c9d5; cursor:default; }
  .guess-list { display:flex; flex-direction:column; gap:6px; }
  .guess-item { display:flex; align-items:center; gap:8px; font-size:13px; color:#7a6650; }
  .guess-bar-wrap { flex:1; background:#f3e6d8; border-radius:6px; overflow:hidden; height:14px; }
  .guess-bar { height:100%; background:linear-gradient(90deg,#ffb6c9,#ff8fab); }
  .modal-mask { position:fixed; inset:0; background:rgba(10,3,25,0.6); z-index:25; display:none; align-items:center; justify-content:center; }
  .modal-mask.show { display:flex; }
  .modal-box { width:min(400px,88vw); background:#fff8ef; border-radius:14px; padding:26px; box-shadow:0 20px 50px rgba(0,0,0,0.4); }
  .modal-box h3 { color:#e8608a; margin-bottom:14px; font-size:16px; }
  .modal-box label { font-size:12px; color:#a98; display:block; margin-bottom:4px; }
  .modal-box input[type="text"] { width:100%; padding:9px 10px; border-radius:8px; border:1px solid #eddcc9; font-size:14px; margin-bottom:14px; font-family:inherit; }
  .modal-box textarea { width:100%; height:120px; border-radius:8px; border:1px solid #eddcc9; padding:10px; font-size:14px; resize:none; font-family:inherit; }
  .modal-box .count { text-align:right; font-size:11px; color:#bbb; margin-top:4px; }
  .modal-actions { display:flex; justify-content:flex-end; gap:10px; margin-top:14px; }
  .modal-actions button { border:none; padding:8px 16px; border-radius:8px; font-size:13px; cursor:pointer; }
  .btn-cancel { background:#eee; color:#777; }
  .btn-submit { background:#ff8fab; color:#fff; }
  .btn-secondary { background:#ece1ff; color:#8a63e8; }
  .mode-choice { display:flex; gap:12px; margin-bottom:4px; }
  .mode-choice button { flex:1; padding:16px 10px; border-radius:12px; border:1px solid #eddcc9; background:#fff; font-size:14px; cursor:pointer; color:#7a6650; }
  .mode-choice button:hover { background:#fff0e6; }
  .record-area { text-align:center; padding:6px 0; }
  .record-indicator { width:80px; height:80px; border-radius:50%; margin:10px auto; background:radial-gradient(circle,#ff9dc0,#ff6b9d); display:flex; align-items:center; justify-content:center; font-size:30px; color:#fff; }
  .record-indicator.recording { animation: recPulse 1s infinite; }
  @keyframes recPulse { 0%,100%{transform:scale(1); box-shadow:0 0 0 0 rgba(255,107,157,0.5);} 50%{transform:scale(1.06); box-shadow:0 0 0 14px rgba(255,107,157,0);} }
  .record-time { font-size:13px; color:#a98; margin-top:6px; }
  .recognized-preview { min-height:40px; margin-top:12px; font-size:13px; color:#7a6650; background:#f6efe4; border-radius:8px; padding:10px; text-align:left; }
  .record-hint { font-size:11px; color:#bbb; margin-top:8px; }
  .toast { position:fixed; bottom:60px; left:50%; transform:translateX(-50%); background:rgba(255,255,255,0.95); color:#e8608a; padding:10px 20px; border-radius:20px; font-size:13px; opacity:0; transition:opacity 0.4s; z-index:30; pointer-events:none; max-width:80vw; text-align:center; }
  .toast.show { opacity:1; }
  .marquee-bar { position:fixed; bottom:0; left:0; width:100%; height:36px; background: rgba(20,5,40,0.6); overflow:hidden; z-index:6; display:flex; align-items:center; backdrop-filter: blur(2px); }
  .marquee-track { display:flex; white-space:nowrap; animation: scroll-left 28s linear infinite; }
  .marquee-track span { font-size:13px; letter-spacing:1px; padding-right:50px; cursor:pointer; }
  .marquee-track span.user { color:#ff9dc0; }
  .marquee-track span.system { color:#999; }
  .marquee-track span.voice-anon { color:#c9a8ff; }
  @keyframes scroll-left { from{ transform:translateX(0);} to{ transform:translateX(-50%);} }
  .controls { position:fixed; top:16px; right:16px; z-index:7; display:flex; gap:8px; }
  .controls button { background: rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.35); color:#fff; border-radius:20px; padding:8px 14px; font-size:13px; cursor:pointer; backdrop-filter: blur(4px); }
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div id="heartsBg"></div>
<div class="title">💌 匿名情人節告白信牆</div>
<div class="countdown" id="countdown"></div>

<div class="scene">
  <div class="envelope-wrap" id="composeTrigger">
    <div class="envelope">
      <div class="env-back"></div>
      <div class="env-flap"></div>
      <div class="env-heart-seal">💌</div>
    </div>
    <div class="hint">點我,留下你的告白</div>
    <div class="count-tag" id="countTag">載入中...</div>
  </div>
</div>

<div class="mini-envelope" id="miniEnvelope">
  <div class="mini-env-back"></div>
  <div class="mini-env-flap" id="miniFlap"></div>
</div>

<div class="letter-paper" id="letterPaper">
  <button class="close-btn" id="closeBtn">✕</button>
  <span class="tag" id="letterTag">使用者投稿</span>
  <div class="recipient-line" id="recipientLine" style="display:none;"></div>
  <div id="anonHeading" class="anon-heading" style="display:none;"></div>
  <div class="paper-content" id="typedText"></div>
  <div class="audio-player" id="audioPlayer" style="display:none;">
    <span>🔊</span>
    <audio id="audioEl" controls></audio>
  </div>
  <div class="guess-box" id="guessBox">
    <h4>💭 猜猜這是誰寫的?</h4>
    <div class="guess-status" id="guessStatus" style="display:none;"></div>
    <div class="guess-row">
      <input type="text" id="guessInput" placeholder="輸入你猜的名字...">
      <button id="guessSubmit">送出猜測</button>
    </div>
    <div class="guess-list" id="guessList"></div>
  </div>
</div>

<!-- 選擇投稿方式 -->
<div class="modal-mask" id="choiceModal">
  <div class="modal-box">
    <h3>想用哪種方式告白?</h3>
    <div class="mode-choice">
      <button id="chooseText">✍️<br>文字投稿</button>
      <button id="chooseVoice">🎤<br>語音告白</button>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="choiceCancel">取消</button>
    </div>
  </div>
</div>

<!-- 文字投稿 -->
<div class="modal-mask" id="modalMask">
  <div class="modal-box">
    <h3>寫下你的匿名告白 💗</h3>
    <label>這封信是要給誰的?(選填)</label>
    <input type="text" id="recipientInputText" placeholder="例如:小明 / 三班的她">
    <label>告白內容</label>
    <textarea id="letterInput" maxlength="300" placeholder="想對某個人說的話,寫下來吧,完全匿名..."></textarea>
    <div class="count" id="charCount">0 / 300</div>
    <div class="modal-actions">
      <button class="btn-cancel" id="cancelBtn">取消</button>
      <button class="btn-submit" id="submitBtn">投稿</button>
    </div>
  </div>
</div>

<!-- 語音告白 -->
<div class="modal-mask" id="voiceModal">
  <div class="modal-box">
    <h3>錄下你的語音告白 🎤</h3>
    <label>這封信是要給誰的?(選填)</label>
    <input type="text" id="recipientInputVoice" placeholder="例如:小明 / 三班的她">
    <div class="record-area">
      <div class="record-indicator" id="recIndicator">🎙️</div>
      <div class="record-time" id="recTime">00:00 / 最長 20 秒</div>
      <div class="recognized-preview" id="recognizedPreview">辨識文字會顯示在這裡...</div>
      <div class="record-hint" id="recHint">按下開始錄音,說出你的告白 (v6)</div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="voiceCancel">取消</button>
      <button class="btn-secondary" id="voiceStart">開始錄音</button>
      <button class="btn-submit" id="voiceStop" style="display:none;">完成,投稿</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- 【v13】投稿清單 -->
<div class="modal-mask" id="lettersListModal">
  <div class="letters-list-box">
    <h3>📮 所有投稿</h3>
    <div class="letters-list-body" id="lettersListBody"></div>
    <button class="letters-list-close" id="lettersListClose">關閉</button>
  </div>
</div>
<div class="marquee-bar"><div class="marquee-track" id="marqueeTrack"></div></div>
<div class="controls"><button id="muteBtn">🔊 音樂</button></div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, getDoc, setDoc, updateDoc, increment, query, orderBy, onSnapshot, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";
import { pipeline, env } from "https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2";
env.allowLocalModels = false; // 一律從 CDN 抓模型,不嘗試找本機路徑

// ── Firebase 初始化 ──
const firebaseConfig = {
  apiKey: "AIzaSyBCNbaCHTxbrD1VaWDNUGob9-blFmmEGN4",
  authDomain: "valentines-b05b0.firebaseapp.com",
  projectId: "valentines-b05b0",
  storageBucket: "valentines-b05b0.firebasestorage.app",
  messagingSenderId: "24513628250",
  appId: "1:24513628250:web:41230da37f0a28da95b063",
  measurementId: "G-G6P9BRE5RG"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
getAnalytics(app);

// ── 本機 ID(代替 personal storage 做一人一票 & 動物分配) ──
function getLocalId(){
  let id = localStorage.getItem('valentine-uid');
  if (!id){ id = crypto.randomUUID(); localStorage.setItem('valentine-uid', id); }
  return id;
}
const MY_UID = getLocalId();

// ── 星星 & 愛心 ──
const starsEl = document.getElementById('stars');
for(let i=0;i<70;i++){
  const s=document.createElement('div'); s.className='star';
  s.style.left=Math.random()*100+'%'; s.style.top=Math.random()*70+'%';
  s.style.animationDelay=(Math.random()*3)+'s';
  s.style.width=s.style.height=(Math.random()*2+1)+'px';
  starsEl.appendChild(s);
}
const heartsBg=document.getElementById('heartsBg');
const heartEmojis=['💕','💗','💖','💘','🌹'];
function spawnHeart(){
  const h=document.createElement('div'); h.className='heart';
  h.textContent=heartEmojis[Math.floor(Math.random()*heartEmojis.length)];
  h.style.left=Math.random()*100+'%'; h.style.fontSize=(14+Math.random()*16)+'px';
  const dur=8+Math.random()*8; h.style.animationDuration=dur+'s';
  heartsBg.appendChild(h); setTimeout(()=>h.remove(),dur*1000+500);
}
setInterval(spawnHeart,800);
for(let i=0;i<5;i++) setTimeout(spawnHeart,i*300);

// ── 音樂(Tone.js CDN,非 module) ──
const toneScript = document.createElement('script');
toneScript.src = 'https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js';
document.head.appendChild(toneScript);
let started=false, musicOn=true, synthP, loopT, typeSynth;
async function startMusic(){
  if(started) return; started=true;
  try{
    await Tone.start();
    const rev=new Tone.Reverb({decay:6,wet:0.55}).toDestination();
    const flt=new Tone.Filter(1800,"lowpass").connect(rev);
    synthP=new Tone.PolySynth(Tone.Synth,{oscillator:{type:"sine"},envelope:{attack:1.2,decay:0.8,sustain:0.5,release:3}}).connect(flt);
    synthP.volume.value=-14;
    const chords=[["C4","E4","G4","B4"],["A3","C4","E4","G4"],["F3","A3","C4","E4"],["G3","B3","D4","F4"]];
    let idx=0; Tone.Transport.bpm.value=54;
    loopT=new Tone.Loop((t)=>{synthP.triggerAttackRelease(chords[idx++%chords.length],"2n",t);},"2n").start(0);
    Tone.Transport.start();
  }catch(e){console.warn('音樂失敗',e);}
}
document.getElementById('muteBtn').addEventListener('click',async()=>{
  if(!started){await startMusic();musicOn=true;}
  else{musicOn=!musicOn; if(musicOn){Tone.Transport.start();if(loopT)loopT.start(0);}else{if(loopT)loopT.stop();Tone.Transport.stop();}}
  document.getElementById('muteBtn').textContent=musicOn?"🔊 音樂":"🔈 靜音";
});

// 【v11】錄音期間暫停背景音樂：喇叭播音樂 + echoCancellation 會把人聲攪爛（實測錄音只剩 -22dB 雜音）
let musicPausedForRec=false;
function pauseMusicForRecording(){
  if(typeof Tone!=='undefined' && started && musicOn){
    try{ if(loopT)loopT.stop(); Tone.Transport.pause(); musicPausedForRec=true; }catch(e){}
  }
}
function resumeMusicAfterRecording(){
  if(musicPausedForRec){
    try{ Tone.Transport.start(); if(loopT)loopT.start(0); }catch(e){}
    musicPausedForRec=false;
  }
}

// 【v14, v16 強化】語音變聲鏈：Tone.PitchShift 只變音調、不變速度
// 【v16】context 未啟動時接鏈路會完全無聲——先喚醒，喚不醒就不接（走原生輸出，原聲播放）
let letterPitchNode=null, letterSrcWired=false;
async function setLetterPitch(semitones){
  try{
    await Tone.start();  // 使用者點開信件即是手勢，可喚醒 context
    const raw=Tone.getContext().rawContext;
    if(raw.state!=='running'){ await raw.resume(); }
    if(raw.state!=='running'){ console.warn('音訊 context 未運行,改原聲播放'); return; }
    const audioEl=document.getElementById('audioEl');
    if(!letterSrcWired){
      // createMediaElementSource 每個元素只能呼叫一次，全域接一次後永久走此鏈
      const srcNode=raw.createMediaElementSource(audioEl);
      letterPitchNode=new Tone.PitchShift({pitch:0,windowSize:0.1}).toDestination();
      Tone.connect(srcNode,letterPitchNode);
      letterSrcWired=true;
    }
    letterPitchNode.pitch=semitones;
  }catch(e){ console.warn('變聲鏈建立失敗,以原聲播放:',e); }
}
function initTypeSynth(){
  typeSynth=new Tone.Synth({oscillator:{type:"square"},envelope:{attack:0.001,decay:0.04,sustain:0,release:0.02}}).toDestination();
  typeSynth.volume.value=-22;
}
function playTick(){
  if(!typeSynth)return;
  typeSynth.triggerAttackRelease(["C6","D6","E6"][Math.floor(Math.random()*3)],"32n");
}

async function getMyAnimalName(){
  const ref=doc(db,'users',MY_UID);
  // 先在 transaction 外快速檢查(省一次不必要的 transaction),真正判斷仍在 transaction 內
  const preSnap=await getDoc(ref);
  if(preSnap.exists()&&preSnap.data().animalName) return preSnap.data().animalName;

  const metaRef=doc(db,'meta','usedAnimals');
  // 用 transaction 把「讀取已用清單、挑選、扣除、寫回」包成原子操作,
  // 避免多人同時投稿時讀到同一份清單、挑到同一隻動物(race condition)
  return await runTransaction(db,async(tx)=>{
    const userSnap=await tx.get(ref);
    if(userSnap.exists()&&userSnap.data().animalName) return userSnap.data().animalName;

    const usedSnap=await tx.get(metaRef);
    const used=(usedSnap.exists()&&usedSnap.data().list)||[];
    const avail=ANIMALS.filter(a=>!used.includes(a));
    const picked=avail.length>0?avail[Math.floor(Math.random()*avail.length)]:ANIMALS[Math.floor(Math.random()*ANIMALS.length)]+(Math.floor(Math.random()*90)+10);

    tx.set(metaRef,{list:[...used,picked]});
    tx.set(ref,{animalName:picked,uid:MY_UID},{merge:true});
    return picked;
  });
}

async function refreshGuesses(letterId){
  const listEl=document.getElementById('guessList');
  listEl.innerHTML='<div style="font-size:12px;color:#bbb;">載入中...</div>';
  try{
    const snap=await getDoc(doc(db,'guesses',letterId));
    const data=(snap.exists()&&snap.data())||{};
    const guesses=data.votes||{};
    // 【新增】Firestore 層級一人一次：即使清了 localStorage，伺服器紀錄仍擋住
    const remoteGuess=data.guessers&&data.guessers[MY_UID];
    if(remoteGuess){
      const input=document.getElementById('guessInput'),btn=document.getElementById('guessSubmit'),statusEl=document.getElementById('guessStatus');
      input.disabled=true; btn.disabled=true;
      statusEl.style.display='block'; statusEl.textContent=`你已經猜過了:「${remoteGuess}」`;
      localStorage.setItem('guessed:'+letterId,remoteGuess);
    }
    renderGuesses(guesses);
  }catch(e){ listEl.innerHTML='<div style="font-size:12px;color:#bbb;">還沒有人猜!</div>'; }
}
function renderGuesses(guesses){
  const listEl=document.getElementById('guessList');
  const entries=Object.entries(guesses).sort((a,b)=>b[1]-a[1]);
  if(!entries.length){listEl.innerHTML='<div style="font-size:12px;color:#bbb;">還沒有人猜,當第一個吧!</div>';return;}
  const max=entries[0][1];
  listEl.innerHTML=entries.map(([name,cnt])=>`
    <div class="guess-item">
      <span style="min-width:70px;">${escapeHtml(name)}</span>
      <div class="guess-bar-wrap"><div class="guess-bar" style="width:${cnt/max*100}%"></div></div>
      <span>${cnt}</span>
    </div>`).join('');
}
document.getElementById('guessSubmit').addEventListener('click',async()=>{
  const input=document.getElementById('guessInput'),btn=document.getElementById('guessSubmit'),statusEl=document.getElementById('guessStatus');
  const name=input.value.trim();
  if(!name||!currentLetterId||btn.disabled) return;
  btn.disabled=true; input.disabled=true;
  const letterId=currentLetterId;
  try{
    const ref=doc(db,'guesses',letterId);
    // 【改動】用 transaction 原子性確保同一使用者只能猜一次
    const votesResult=await runTransaction(db,async(tx)=>{
      const snap=await tx.get(ref);
      const data=(snap.exists()&&snap.data())||{};
      const votes=data.votes||{};
      const guessers=data.guessers||{};
      if(guessers[MY_UID]) throw new Error('ALREADY_GUESSED');
      votes[name]=(votes[name]||0)+1;
      guessers[MY_UID]=name;
      tx.set(ref,{votes,guessers},{merge:true});
      return votes;
    });
    localStorage.setItem('guessed:'+letterId,name);
    renderGuesses(votesResult);
    statusEl.style.display='block'; statusEl.textContent=`你已經猜過了:「${name}」`;

let pendingAudioData = null, pendingRecognizedText = '';
let asrPipelinePromise = null;

function getAsrPipeline() {
  if (!asrPipelinePromise) {

// ============================================
// 【v13】Whisper 改跑 Web Worker：主執行緒不再被 WASM 卡死（修「網頁無回應」當機）
// ============================================
let whisperWorker = null;
let whisperReqId = 0;
const whisperPending = new Map();

function getWhisperWorker() {
  if (whisperWorker) return whisperWorker;
  const workerCode = `
    import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';
    let p = null;
    async function ensure(cb) {
      if (!p) {
        p = await pipeline('automatic-speech-recognition', 'Xenova/whisper-tiny', {
          progress_callback: (x) => {
            if (x.status === 'progress' && typeof x.progress === 'number') {
              self.postMessage({ type: 'progress', progress: x.progress });
            }
          }
        });
      }
      return p;
    }
    self.onmessage = async (e) => {
      const { cmd, id, pcm } = e.data;
      try {
        if (cmd === 'init') { await ensure(); self.postMessage({ type: 'ready', id }); return; }
        if (cmd === 'transcribe') {
          const pipe = await ensure();
          const r = await pipe(pcm, { language: 'chinese', task: 'transcribe' });
          self.postMessage({ type: 'result', id, ok: true, text: (r?.text || '').trim() });
        }
      } catch (err) {
        self.postMessage({ type: 'result', id, ok: false, error: err.message });
      }
    };
  `;
  const blob = new Blob([workerCode], { type: 'text/javascript' });
  whisperWorker = new Worker(URL.createObjectURL(blob), { type: 'module' });
  whisperWorker.onmessage = (e) => {
    const d = e.data;
    if (d.type === 'progress') {
      const hint = document.getElementById('recHint');
      if (hint) hint.textContent = `辨識模型下載中... ${Math.round(d.progress)}%(第一次使用需下載)`;
      return;
    }
    const cb = whisperPending.get(d.id);
    if (cb) { whisperPending.delete(d.id); cb(d); }
  };
  whisperWorker.onerror = (err) => {
    console.warn('Whisper Worker 錯誤:', err.message);
    for (const [id, cb] of whisperPending) cb({ ok: false, error: 'Worker 崩潰: ' + err.message });
    whisperPending.clear();
    whisperWorker = null;  // 下次重建
  };
  return whisperWorker;
}

// 預載模型（不阻塞）
function whisperWorkerInit() {
  try {
    const w = getWhisperWorker();
    const id = ++whisperReqId;
    whisperPending.set(id, () => {});
    w.postMessage({ cmd: 'init', id });
  } catch (e) { console.warn('Worker 預載失敗:', e); }
}

// 在 Worker 中辨識（pcm 以 transferable 傳遞，零拷貝）
function whisperWorkerTranscribe(pcm) {
  return new Promise((resolve, reject) => {
    let w;
    try { w = getWhisperWorker(); } catch (e) { return reject(e); }
    const id = ++whisperReqId;
    whisperPending.set(id, (d) => d.ok ? resolve(d.text) : reject(new Error(d.error)));
    // 傳 copy 而非 transfer，保留主執行緒的 pcm 可再用
    w.postMessage({ cmd: 'transcribe', id, pcm });
  });
}

// 即時音量條：錄音中直接看到麥克風收音狀況
function startLevelMeter() {
  if (!recAnalyser) return;
  const buf = new Uint8Array(recAnalyser.fftSize);
  let lastT = performance.now();
  const tick = () => {
    if (!recAnalyser) return;
    recAnalyser.getByteTimeDomainData(buf);
    let peak = 0;
    for (let i = 0; i < buf.length; i++) {
      const v = Math.abs(buf[i] - 128) / 128;
      if (v > peak) peak = v;
    }
    const now = performance.now();
    const dt = (now - lastT) / 1000; lastT = now;
    if (peak < 0.03) recSilentMs += dt * 1000; else recSilentMs = 0;
    // 【v19】AGC 已整條移除（改錄後統一處理），此處只做顯示與靜音警告
    const bars = '▁▂▃▄▅▆▇█';
    const level = bars.slice(0, Math.max(1, Math.min(8, Math.ceil(peak * 12))));
    const hint = document.getElementById('recHint');
    if (hint) {
      hint.textContent = recSilentMs > 1500
        ? '⚠️ 幾乎收不到聲音!請靠近麥克風大聲說'
        : `錄音中... 音量 ${level}`;
    }
    recMeterRAF = requestAnimationFrame(tick);
  };
  recMeterRAF = requestAnimationFrame(tick);
}

document.getElementById('voiceStart').addEventListener('click', async () => {
  if (!navigator.mediaDevices?.getUserMedia) { showToast('此環境不支援錄音'); return; }
  // 【v11】錄音前暫停背景音樂，避免回音消除把人聲攪爛
  pauseMusicForRecording();
  try {
    currentStream = await navigator.mediaDevices.getUserMedia({
      audio: { 
        autoGainControl: false,      // 【v23】關閉:Chrome AGC 開頭過衝後猛壓輸入(頭大聲尾小聲元凶)。錄音端零自動增益,音量全交離線調平
        noiseSuppression: false,     // 【v11】關閉：NS 會把較小的人聲當噪音吃掉
        echoCancellation: false,     // 【v11】關閉：音樂已暫停，無回音源；AEC 是錄音只剩雜音的元凶
        channelCount: { ideal: 1 }
      }
    });
  } catch (e) { resumeMusicAfterRecording(); showToast('無法取得麥克風權限'); return; }
  
  audioChunks = [];
  
  // 針對不同瀏覽器/手機挑選最穩定的錄音格式
  let options = { audioBitsPerSecond: 128000 };
  const types = ['audio/webm;codecs=opus', 'audio/webm', 'audio/mp4', 'audio/aac'];
  for (const type of types) {
    if (MediaRecorder.isTypeSupported(type)) {
      options.mimeType = type;
      break;
    }
  }

  // 【v19】停止即時對抗：拆除自製 AGC/限幅器整條鏈（v12~v18 與筆電驅動自帶 AGC 互相打架，
  // 造成 1 秒懸崖/爆音/風扇被拉大等問題）。錄「原始串流」，音量統一改在錄後處理（見 onRecordingStop）。
  // 這裡只留 analyser 做即時音量條監測。
  let streamToRecord = currentStream;
  recSilentMs = 0;
  try {
    const ACtx = window.AudioContext || window.webkitAudioContext;
    recAudioCtx = new ACtx();
    await recAudioCtx.resume();
    const src = recAudioCtx.createMediaStreamSource(currentStream);
    recAnalyser = recAudioCtx.createAnalyser();
    recAnalyser.fftSize = 512;
    src.connect(recAnalyser);  // 只監測,不改寫訊號
  } catch (e) {
    console.warn('音量監測建立失敗(不影響錄音):', e);
    stopLevelMeter();
  }

  try { 
    mediaRecorder = new MediaRecorder(streamToRecord, options); 
  } catch (e) { 
    try {
      mediaRecorder = new MediaRecorder(streamToRecord); // 萬用降級方案
    } catch(err) {
      stopLevelMeter();
      showToast('此瀏覽器不支援錄音格式'); return; 
    }
  }

  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
  mediaRecorder.onstop = onRecordingStop;
  
  // 每 100ms 寫入一次資料，減少手機緩衝溢位掉封包
  mediaRecorder.start(100); 
  
  recordSeconds = 0;
  document.getElementById('recIndicator').classList.add('recording');
  document.getElementById('recHint').textContent = '錄音中...';
  document.getElementById('recognizedPreview').textContent = '錄完後會一次辨識,請完整說完你的告白...';
  document.getElementById('voiceStart').style.display = 'none';
  document.getElementById('voiceStop').style.display = 'inline-block';
  startLevelMeter();  // 【v12】啟動即時音量條
  
  recordTimer = setInterval(() => {
    recordSeconds++;
    const mm = String(Math.floor(recordSeconds / 60)).padStart(2, '0'), ss = String(recordSeconds % 60).padStart(2, '0');
    document.getElementById('recTime').textContent = `${mm}:${ss} / 最長 20 秒`;
    if (recordSeconds >= 20) stopRecording(false);
  }, 1000);
});

function stopRecording(cancelled) {
  clearInterval(recordTimer);
  stopLevelMeter();  // 【v12】停止即時音量條
  document.getElementById('recIndicator').classList.remove('recording');
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    if (cancelled) {
      mediaRecorder.onstop = () => {};
      try { mediaRecorder.stop(); } catch(e){}
      if (currentStream) currentStream.getTracks().forEach(t => t.stop());
      closeRecAudio();
      resumeMusicAfterRecording();  // 【v11】取消也要恢復音樂
      return;
    }
    // 【修正】手機 stop 時最後一塊資料可能還沒送達，先強制 requestData 收尾
    try { if (mediaRecorder.state === 'recording') mediaRecorder.requestData(); } catch(e){}
    // 稍等讓最後的 dataavailable 觸發完再 stop，避免尾端音訊遺失
    setTimeout(() => {
      try { mediaRecorder.stop(); } catch(e){}
      if (currentStream) currentStream.getTracks().forEach(t => t.stop());
      closeRecAudio();  // 【v12】recorder 停止後才關閉增強鏈
    }, 250);
  } else {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    closeRecAudio();
    resumeMusicAfterRecording();
  }
}

// 【關鍵優化】使用 OfflineAudioContext 進行精準且安全的 16kHz 重取樣，防止手機解碼音質爆音或速度異常
async function blobToPcm16k(blob) {
  const arrayBuffer = await blob.arrayBuffer();
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  const tempCtx = new AudioCtx();
  let originalBuffer;
  try {
    originalBuffer = await tempCtx.decodeAudioData(arrayBuffer);
  } finally {
    tempCtx.close();
  }

  // 使用離線上下文將聲音完美重取樣至 16000Hz (Whisper 指定格式)
  const offlineCtx = new OfflineAudioContext(
    1, 
    Math.round(originalBuffer.duration * 16000), 
    16000
  );
  
  const bufferSource = offlineCtx.createBufferSource();
  bufferSource.buffer = originalBuffer;
  bufferSource.connect(offlineCtx.destination);
  bufferSource.start();
  
  const renderedBuffer = await offlineCtx.startRendering();
  return renderedBuffer.getChannelData(0);
}

async function onRecordingStop() {
  resumeMusicAfterRecording();  // 【v11】辨識開始即可恢復音樂
  if (!audioChunks.length) return;
  // 保持與錄音時相同的 mimeType 封裝 Blob
  const mimeType = mediaRecorder.mimeType || 'audio/webm';
  const blob = new Blob(audioChunks, { type: mimeType });
  
  try { pendingAudioData = await blobToBase64(blob); }
  catch (e) { showToast('錄音處理失敗'); return; }

  const vstop = document.getElementById('voiceStop');
  vstop.disabled = true; 
  document.getElementById('recHint').textContent = '辨識中,請稍候...';
  document.getElementById('recognizedPreview').textContent = '（辨識中...）';

  let failReason = '';
  let sourceInfo = '';
  try {
    // 【改動】使用新的智能降級方案：Gemini → Whisper
    const result = await recognizeWithFallback(pendingAudioData, blob);
    
    if (result.success) {
      pendingRecognizedText = result.text;
      // 【改動】顯示來源引擎 + 實際音訊秒數；若 Gemini 失敗降級，一併顯示原因
      sourceInfo = `${result.source}·${result.duration}s`;
      if (result.geminiError) {
        sourceInfo += `｜${result.geminiError.substring(0, 80)}`;
      }
      // 【v11】警告：音量過低 / 錄音被截斷（有效音訊遠短於錄音計時）
      if (result.lowVolume) sourceInfo += '｜⚠️音量偏低,建議靠近麥克風重錄';
      // 【v25】辨識成功即代表音質足夠,不再顯示品質警告(警告只留在失敗路徑,避免狼來了)
      if (recordSeconds >= 3 && parseFloat(result.duration) < recordSeconds * 0.6) {
        sourceInfo += `｜⚠️錄音疑似中斷(計時${recordSeconds}s但只收到${result.duration}s)`;
      }
      console.log(`✅ ${result.source} 辨識完成`);
    } else {
      pendingRecognizedText = '';
      failReason = result.error || '';
      if (result.poorQuality) failReason = '收音品質過差(請關閉Windows麥克風「增強功能」後重試,或改用手機)｜' + failReason;
      console.warn('⚠️ 辨識失敗:', result.error);
    }

    // 【v19】以「辨識用的正規化+裁靜音 PCM」重建儲存音檔：
    // 播放音量跨裝置一致、驅動泵動被 DRC 撫平、開頭懸崖/尾端靜音已裁除
    if (result.pcm && result.pcm.length > 4800) {  // 至少 0.3 秒才值得重建
      try {
        pendingAudioData = 'data:audio/wav;base64,' + pcm16kToWavBase64(result.pcm);
        console.log('✅ 儲存音檔已重建為正規化 WAV');
      } catch (e2) { console.warn('WAV 轉存失敗,保留原始錄音:', e2); }
    }
  } catch (e) {
    console.error('未預期的錯誤:', e);
    pendingRecognizedText = '';
    failReason = e.message || '';
  }

  vstop.disabled = false;
  // 【改動】失敗時在畫面顯示原因，手機不用開控制台也能除錯
  document.getElementById('recognizedPreview').textContent = pendingRecognizedText 
    || (failReason ? `（未辨識到文字）原因: ${failReason}` : '（未辨識到文字,將以動物匿名顯示）');
  document.getElementById('recHint').textContent = pendingRecognizedText 
    ? `✅ 辨識完成 (${sourceInfo})!確認送出吧` 
    : '⚠️ 未辨識到文字,將以動物匿名顯示';
  vstop.textContent = '確認,送出投稿'; vstop.onclick = submitVoiceLetter;
}

function blobToBase64(blob) {
  return new Promise((res, r_ej) => { const r = new FileReader(); r.onloadend = () => res(r.result); r.onerror = r_ej; r.readAsDataURL(blob); });
}

// 【動態範圍壓縮】修復音量波動
function dynamicRangeCompression(samples, threshold = 0.5, ratio = 4) {
  const output = new Float32Array(samples.length);
  
  for (let i = 0; i < samples.length; i++) {
    const abs = Math.abs(samples[i]);
    let gain = 1.0;
    
    if (abs > threshold) {
      gain = threshold + (abs - threshold) / ratio;
      gain = threshold / gain;
    }
    
    output[i] = samples[i] * gain;
  }
  
  // 【修正】用迴圈求峰值（Math.max(...大陣列) 會爆棧 Maximum call stack size exceeded）
  let max = 0;
  for (let i = 0; i < output.length; i++) {
    const abs = Math.abs(output[i]);
    if (abs > max) max = abs;
  }
  // 峰值正規化到 0.95（同時解決音量過小與削波）
  if (max > 0.0001) {
    const norm = 0.95 / max;
    for (let i = 0; i < output.length; i++) {
      output[i] *= norm;
    }
  }
  
  return output;
}


// 【v27】頻譜減噪：處理「說話期間」的寬頻嘶聲（時域門與高通都切不到）。
// 原理：取能量最低30%幀估計噪音頻譜(逐bin中位數)，每幀頻譜減去1.6倍噪音、保留6%下限防音樂噪音。
// 實測(用戶實檔)：噪音幀全頻帶-18dB,語音幀僅-1~3dB。
function fftInPlace(re, im, inv) {
  const n = re.length;
  for (let i = 1, j = 0; i < n; i++) {
    let bit = n >> 1;
    for (; j & bit; bit >>= 1) j ^= bit;
    j ^= bit;
    if (i < j) { let t = re[i]; re[i] = re[j]; re[j] = t; t = im[i]; im[i] = im[j]; im[j] = t; }
  }
  for (let len = 2; len <= n; len <<= 1) {
    const ang = (inv ? 1 : -1) * 2 * Math.PI / len;
    const wr = Math.cos(ang), wi = Math.sin(ang);
    for (let i = 0; i < n; i += len) {
      let cr = 1, ci = 0;
      for (let k = 0; k < len / 2; k++) {
        const ur = re[i + k], ui = im[i + k];
        const vr = re[i + k + len / 2] * cr - im[i + k + len / 2] * ci;
        const vi = re[i + k + len / 2] * ci + im[i + k + len / 2] * cr;
        re[i + k] = ur + vr; im[i + k] = ui + vi;
        re[i + k + len / 2] = ur - vr; im[i + k + len / 2] = ui - vi;
        const ncr = cr * wr - ci * wi; ci = cr * wi + ci * wr; cr = ncr;
      }
    }
  }
  if (inv) for (let i = 0; i < n; i++) { re[i] /= n; im[i] /= n; }
}

function spectralDenoise(pcm, sr = 16000) {
  const FRAME = 512, HOP = 256, BINS = FRAME / 2 + 1;
  const nF = Math.floor((pcm.length - FRAME) / HOP) + 1;
  if (nF < 24) return pcm;  // 太短不處理
  const win = new Float32Array(FRAME);
  for (let i = 0; i < FRAME; i++) win[i] = 0.5 * (1 - Math.cos(2 * Math.PI * i / FRAME));
  // 前向:存每幀複數頻譜與能量
  const reA = new Float32Array(nF * BINS), imA = new Float32Array(nF * BINS), rmsA = new Float32Array(nF);
  const re = new Float32Array(FRAME), im = new Float32Array(FRAME);
  for (let f = 0; f < nF; f++) {
    let e = 0;
    for (let i = 0; i < FRAME; i++) { const v = pcm[f * HOP + i] * win[i]; re[i] = v; im[i] = 0; e += v * v; }
    rmsA[f] = Math.sqrt(e / FRAME);
    fftInPlace(re, im, false);
    for (let b = 0; b < BINS; b++) { reA[f * BINS + b] = re[b]; imA[f * BINS + b] = im[b]; }
  }
  // 噪音幀=能量最低30%
  const thr = Array.from(rmsA).sort((a, b) => a - b)[Math.floor(nF * 0.3)];
  const nIdx = [];
  for (let f = 0; f < nF; f++) if (rmsA[f] <= thr) nIdx.push(f);
  if (nIdx.length < 8) return pcm;
  // 逐bin中位數噪音頻譜
  const noiseMag = new Float32Array(BINS);
  const tmp = new Float32Array(nIdx.length);
  for (let b = 0; b < BINS; b++) {
    for (let k = 0; k < nIdx.length; k++) {
      const o = nIdx[k] * BINS + b;
      tmp[k] = Math.hypot(reA[o], imA[o]);
    }
    noiseMag[b] = Array.from(tmp).sort((a, c) => a - c)[Math.floor(nIdx.length / 2)];
  }
  // 減法+重建(overlap-add, win^2 權重歸一)
  // 【v28】抑制音樂噪音(閃爍音瑕疵,實測CV 1.8→0.79)：
  //   下限改綁噪音床(0.35×噪音頻譜=平穩殘留,而非綁自身6%=隨機倖存點閃爍)
  //   + 增益逐bin時間平滑(0.9) + 頻域5-bin平滑
  const ALPHA = 1.6, BED = 0.35, TSMOOTH = 0.9;
  const out = new Float32Array(pcm.length), wsum = new Float32Array(pcm.length);
  const prevSc = new Float32Array(BINS), scArr = new Float32Array(BINS), scSm = new Float32Array(BINS);
  for (let f = 0; f < nF; f++) {
    re.fill(0); im.fill(0);
    for (let b = 0; b < BINS; b++) {
      const o = f * BINS + b;
      const m = Math.hypot(reA[o], imA[o]);
      const nm = Math.max(m - ALPHA * noiseMag[b], BED * noiseMag[b]);
      scArr[b] = m > 1e-9 ? Math.min(nm / m, 1.0) : BED;
    }
    // 頻域加權 3-bin 平滑 [1,2,1]/4（實測 CV 同 5-bin 均勻核，但對窄頻語音成分更溫和）
    for (let b = 0; b < BINS; b++) {
      const l = b > 0 ? scArr[b - 1] : scArr[b];
      const r = b < BINS - 1 ? scArr[b + 1] : scArr[b];
      scSm[b] = (l + 2 * scArr[b] + r) / 4;
    }
    for (let b = 0; b < BINS; b++) {
      // 時間平滑
      const sc = f === 0 ? scSm[b] : TSMOOTH * prevSc[b] + (1 - TSMOOTH) * scSm[b];
      prevSc[b] = sc;
      const o = f * BINS + b;
      const r2 = reA[o] * sc, i2 = imA[o] * sc;
      re[b] = r2; im[b] = i2;
      if (b > 0 && b < FRAME / 2) { re[FRAME - b] = r2; im[FRAME - b] = -i2; }  // 共軛對稱
    }
    fftInPlace(re, im, true);
    const base = f * HOP;
    for (let i = 0; i < FRAME; i++) {
      out[base + i] += re[i] * win[i];
      wsum[base + i] += win[i] * win[i];
    }
  }
  for (let i = 0; i < pcm.length; i++) {
    out[i] = wsum[i] > 1e-3 ? out[i] / wsum[i] : pcm[i];
  }
  return out;
}

// 【v26】高通濾波：切除 130Hz 以下的風扇/環境隆隆聲（頻譜驗屍:低頻比語音帶高 9dB=雜音元凶,
// 時域噪音門切不到「說話期間」的低頻底噪）。RBJ biquad ×2 = 四階,語音帶零損傷。
function highpassPcm(pcm, sr = 16000, fc = 130) {
  const out = new Float32Array(pcm);
  for (let pass = 0; pass < 2; pass++) {
    const w0 = 2 * Math.PI * fc / sr, alpha = Math.sin(w0) / (2 * 0.7071), c = Math.cos(w0);
    const a0 = 1 + alpha;
    const b0 = (1 + c) / 2 / a0, b1 = -(1 + c) / a0, b2 = (1 + c) / 2 / a0;
    const a1 = -2 * c / a0, a2 = (1 - alpha) / a0;
    let x1 = 0, x2 = 0, y1 = 0, y2 = 0;
    for (let i = 0; i < out.length; i++) {
      const x0 = out[i];
      const y0 = b0 * x0 + b1 * x1 + b2 * x2 - a1 * y1 - a2 * y2;
      x2 = x1; x1 = x0; y2 = y1; y1 = y0; out[i] = y0;
    }
  }
  return out;
}

// 【v20】離線自適應調平：逐窗把語音拉到目標音量，靜音窗凍結沿用鄰近增益。
// 錄後處理有全局視野，無即時 AGC 回授問題；直接抹平筆電驅動 AGC 的「前 1 秒大聲、之後 -20dB」懸崖
function levelizePcm(pcm, sr = 16000) {
  pcm = highpassPcm(pcm, sr);  // 【v26】先切低頻隆隆聲,調平決策與成品同時受益
  pcm = spectralDenoise(pcm, sr);  // 【v27】再減寬頻嘶聲(說話期間的雜音)
  const win = Math.round(sr * 0.05);           // 50ms 窗
  const nWin = Math.ceil(pcm.length / win);
  if (nWin < 4) return pcm;
  // 1) 每窗 RMS 包絡
  const env = new Float32Array(nWin);
  for (let w = 0; w < nWin; w++) {
    let sum = 0; const s = w * win, e = Math.min(pcm.length, s + win);
    for (let i = s; i < e; i++) sum += pcm[i] * pcm[i];
    env[w] = Math.sqrt(sum / Math.max(1, e - s));
  }
  // 【v23】雙百分位自適應門檻：噪音底=P15、語音參考=P80，門檻取幾何平均。
  // 舊版固定 噪音底×2.5 在「整段都很小聲」時會把語音誤判為噪音(門檻吃掉語音=尾段被壓死)
  const sorted = Array.from(env).sort((a, b) => a - b);
  const noise = Math.max(sorted[Math.floor(sorted.length * 0.15)] || 0, 1e-6);
  const speechRef = Math.max(sorted[Math.floor(sorted.length * 0.8)] || 0, noise * 2);
  const gate = Math.max(Math.sqrt(noise * speechRef), 0.003);
  // 【v24】SNR 改用分類後均值：P15/P80 在「密集說話+零AGC超小訊號」下會失準誤報
  {
    let sS = 0, sN = 0, nS = 0, nN = 0;
    for (let w = 0; w < nWin; w++) {
      if (env[w] > gate) { sS += env[w]; nS++; } else { sN += env[w]; nN++; }
    }
    const sm = nS ? sS / nS : noise, nm = nN ? sN / nN : noise;
    lastSnrDb = 20 * Math.log10(Math.max(sm, 1e-6) / Math.max(nm, 1e-6));
  }
  // 3) 語音窗增益 = 目標RMS 0.14 / 包絡（0.5x~12x）；靜音窗標記 NaN
  const TARGET = 0.14;
  const gains = new Float32Array(nWin);
  const isSpeech = new Uint8Array(nWin);
  for (let w = 0; w < nWin; w++) {
    isSpeech[w] = env[w] > gate ? 1 : 0;
    gains[w] = isSpeech[w] ? Math.min(24, Math.max(0.25, TARGET / env[w])) : NaN;  // 【v23】0.25x~24x:壓得住過衝頭、拉得起超小聲
  }
  // 4) 靜音窗補值：沿用鄰近有效增益
  let last = NaN;
  for (let w = 0; w < nWin; w++) { if (!isNaN(gains[w])) last = gains[w]; else if (!isNaN(last)) gains[w] = last; }
  last = NaN;
  for (let w = nWin - 1; w >= 0; w--) { if (!isNaN(gains[w])) last = gains[w]; else gains[w] = isNaN(last) ? 1 : last; }
  // 【v21】離線噪音門：非語音窗衰減至鄰近增益×0.1（-20dB）。
  // v20 讓字間噪音沿用語音的大增益 → 訊噪差只剩 8dB＝「斷斷續續噪音」元凶
  for (let w = 0; w < nWin; w++) if (!isSpeech[w]) gains[w] *= 0.1;
  // 5)【v21】非對稱雙向平滑：進噪音快降(60ms)、回語音慢升(250ms)；
  //    反向那一遍會在字頭前預先抬升增益，字頭不會被吃掉
  const aF = Math.exp(-0.05 / 0.06), aS = Math.exp(-0.05 / 0.25);
  for (let w = 1; w < nWin; w++) {
    const al = gains[w] < gains[w - 1] ? aF : aS;
    gains[w] = al * gains[w - 1] + (1 - al) * gains[w];
  }
  for (let w = nWin - 2; w >= 0; w--) {
    const al = gains[w] < gains[w + 1] ? aF : aS;
    gains[w] = al * gains[w + 1] + (1 - al) * gains[w];
  }
  // 6) 套用（窗間線性內插）+ 峰值保護
  const out = new Float32Array(pcm.length);
  let peak = 0;
  for (let i = 0; i < pcm.length; i++) {
    const fw = i / win; const w0 = Math.min(nWin - 1, Math.floor(fw));
    const w1 = Math.min(nWin - 1, w0 + 1); const t = fw - w0;
    const g = gains[w0] * (1 - t) + gains[w1] * t;
    out[i] = pcm[i] * g;
    const ab = Math.abs(out[i]); if (ab > peak) peak = ab;
  }
  if (peak > 0.97) { const k = 0.97 / peak; for (let i = 0; i < out.length; i++) out[i] *= k; }
  // 【v24】零AGC原始訊號可能小到撞增益上限,調平後仍偏小 → 整體抬升到健康峰值
  else if (peak > 0.001 && peak < 0.5) { const k = Math.min(4, 0.7 / peak); for (let i = 0; i < out.length; i++) out[i] *= k; }
  return out;
}

// 【PCM 轉換】帶音量正規化
let lastRawPeak = 0;  // 【v11】正規化前的原始峰值，供低音量判斷
let lastSnrDb = 99;   // 【v22】調平時估計的訊噪比(dB)，過低=收音品質差
async function blobToPcm16kWithNormalization(blob) {
  const arrayBuffer = await blob.arrayBuffer();
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  const tempCtx = new AudioCtx();
  let originalBuffer;
  
  try {
    originalBuffer = await tempCtx.decodeAudioData(arrayBuffer);
  } finally {
    tempCtx.close();
  }

  const rawChannelData = originalBuffer.getChannelData(0);
  // 【v11】記錄原始峰值（正規化前）
  lastRawPeak = 0;
  for (let i = 0; i < rawChannelData.length; i++) {
    const abs = Math.abs(rawChannelData[i]);
    if (abs > lastRawPeak) lastRawPeak = abs;
  }
  const compressedData = dynamicRangeCompression(rawChannelData);
  
  const offlineCtx = new OfflineAudioContext(
    1,
    Math.round(originalBuffer.duration * 16000),
    16000
  );
  
  const compressedBuffer = offlineCtx.createBuffer(
    1,
    compressedData.length,
    originalBuffer.sampleRate
  );
  compressedBuffer.getChannelData(0).set(compressedData);
  
  const bufferSource = offlineCtx.createBufferSource();
  bufferSource.buffer = compressedBuffer;
  bufferSource.connect(offlineCtx.destination);
  bufferSource.start();
  
  const renderedBuffer = await offlineCtx.startRendering();
  // 【v20】離線自適應調平：抹平驅動懸崖、統一語音音量
  return levelizePcm(renderedBuffer.getChannelData(0));
}

// 【Gemini API 辨識】雙模型 × 3 Key 全備援（v5：最大化辨識力）
// 順序：gemini-2.5-flash（音訊理解最強）→ gemini-2.0-flash，每個模型輪流 3 把 Key
async function recognizeWithGemini(audioBase64, mimeType = 'audio/webm') {
  // 【v18】2.0-flash 免費層已下架(limit:0)，改以 2.5 系列為主力；遇 limit:0 該模型標記死亡直接跳過
  const MODELS = ['gemini-2.5-flash', 'gemini-2.5-flash-lite', 'gemini-2.0-flash'];
  const deadModels = new Set();
  let lastError = null;

  for (const model of MODELS) {
    if (deadModels.has(model)) continue;  // 【v18】免費層無額度的模型直接跳過，不浪費嘗試
    for (let i = 0; i < API_CONFIG.gemini.length; i++) {
      const { key, index } = getNextGeminiKey();

      // 佔位符未被 GitHub Actions 替換，或 key 為空 → 跳過
      if (!key || key.startsWith('__') || key.startsWith('YOUR_')) {
        lastError = new Error(`Gemini Key ${index + 1} 未設置`);
        console.warn(lastError.message);
        continue;
      }

      try {
        // 【v13】generationConfig：2.5 模型預設開「思考」會把 token 花光導致正文空白 → 關閉
        const genCfg = { temperature: 0, maxOutputTokens: 4096 };
        if (model.includes('2.5')) genCfg.thinkingConfig = { thinkingBudget: 0 };

        const response = await fetch(
          `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=` + key,
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              systemInstruction: {
                parts: [{
                  text: '你是專業的語音轉錄引擎。將這段語音逐字精確轉錄為繁體中文（台灣用語），保留完整內容不可省略或概括。音量可能偏小，請盡力聽寫。只輸出轉錄文字本身，不加任何說明、前綴或註解。'
                }]
              },
              contents: [{
                parts: [
                  {
                    inline_data: {
                      mime_type: mimeType,
                      data: audioBase64.split(',')[1]
                    }
                  },
                  { text: '逐字轉錄此語音為繁體中文' }
                ]
              }],
              generationConfig: genCfg
            })
          }
        );

        const data = await response.json();

        if (!response.ok) {
          const msg = data.error?.message || `HTTP ${response.status}`;
          lastError = new Error(`[${model}] ` + msg);
          console.warn(`❌ ${model} Key ${index + 1} 失敗: ${lastError.message}，嘗試下一個...`);
          // 【v18】limit: 0 = 該模型免費層已無額度（非用完，是下架），換 Key 也沒用 → 標記死亡跳下一模型
          if (msg.includes('limit: 0')) { deadModels.add(model); break; }
          continue;  // 其他錯誤（配額/無效key/權限）換下一個 Key
        }

        // 【v13】正確解析：可能有多個 parts（含思考 part），只取非思考的文字並串接
        const parts = data.candidates?.[0]?.content?.parts || [];
        const text = parts.filter(p => !p.thought).map(p => p.text || '').join('').trim();

        // 【v13 修正】空白回傳視為失敗 → 換下一個模型/Key 續試（先前空白會提前返回，2.0 永遠輪不到）
        if (!text) {
          const fr = data.candidates?.[0]?.finishReason || '';
          lastError = new Error(`[${model}] 回傳空白${fr ? '(' + fr + ')' : ''}`);
          console.warn(`⚠️ ${model} Key ${index + 1} 回傳空白，嘗試下一個...`);
          continue;
        }

        API_CONFIG.stats.gemini[index]++;
        console.log(`✅ ${model} Key ${index + 1} 成功 (總計 ${API_CONFIG.stats.gemini[index]} 次)`);

        return text;
      } catch (error) {
        lastError = error;
        console.warn(`❌ ${model} Key ${index + 1} 網路錯誤: ${error.message}，嘗試下一個...`);
      }
    }
  }

  throw lastError || new Error('所有 Gemini 模型與 Key 都失敗');
}

// 【本機 Whisper】完全離線備選
async function recognizeWithWhisper(blob) {
  try {
    const pcm = await blobToPcm16kWithNormalization(blob);
    const transcriber = await getAsrPipeline();
    const result = await transcriber(pcm, { language: 'chinese', task: 'transcribe' });
    
    API_CONFIG.stats.whisper++;
    console.log(`✅ 本機 Whisper 完成 (總計 ${API_CONFIG.stats.whisper} 次)`);
    
    return (result?.text || '').trim();
  } catch (error) {
    console.error('本機 Whisper 錯誤:', error.message);
    throw error;
  }
}

// 【新增】Float32 PCM → WAV(16-bit) base64（Gemini 官方支援 audio/wav，webm 不支援）
function pcm16kToWavBase64(float32, sampleRate = 16000) {
  const len = float32.length;
  const buffer = new ArrayBuffer(44 + len * 2);
  const view = new DataView(buffer);
  const writeStr = (off, s) => { for (let i = 0; i < s.length; i++) view.setUint8(off + i, s.charCodeAt(i)); };
  writeStr(0, 'RIFF'); view.setUint32(4, 36 + len * 2, true); writeStr(8, 'WAVE');
  writeStr(12, 'fmt '); view.setUint32(16, 16, true); view.setUint16(20, 1, true);
  view.setUint16(22, 1, true); view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * 2, true); view.setUint16(32, 2, true); view.setUint16(34, 16, true);
  writeStr(36, 'data'); view.setUint32(40, len * 2, true);
  let off = 44;
  for (let i = 0; i < len; i++, off += 2) {
    const s = Math.max(-1, Math.min(1, float32[i]));
    view.setInt16(off, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
  }
  const bytes = new Uint8Array(buffer);
  let bin = '';
  const CHUNK = 8192;  // 保守分塊，避免部分手機堆疊上限較低
  for (let i = 0; i < bytes.length; i += CHUNK) {
    bin += String.fromCharCode.apply(null, bytes.subarray(i, i + CHUNK));
  }
  return btoa(bin);
}

// 【新增】過濾 Whisper 幻覺亂字（如「好,好,好,好...」重複輸出）
function filterHallucination(text) {
  if (!text) return '';
  const clean = text.replace(/[\s,，。.、!！?？]/g, '');
  if (clean.length >= 4) {
    const uniqueChars = new Set(clean.split(''));
    // 整句幾乎只由 1-2 個字重複組成 → 視為亂字
    if (uniqueChars.size <= 2 && clean.length >= 6) return '';
    // 單一字符占比超過 80% → 視為亂字
    const counts = {};
    for (const c of clean) counts[c] = (counts[c] || 0) + 1;
    const maxRatio = Math.max(...Object.values(counts)) / clean.length;
    if (maxRatio > 0.8 && clean.length >= 6) return '';
  }
  return text;
}

// 【v7 新增, v10 強化】Whisper 迴圈幻覺去重：同一句重複多次 → 只留一次
function dedupeRepeats(text) {
  if (!text) return '';
  // 【v22】剝除時間戳亂碼：模型對噪音音訊會幻覺出字幕框架(00:0100:02...)
  let t = text.replace(/\d{1,2}:\d{2}(?::\d{2})?/g, ' ');
  // 去掉包裹用的全形/半形括號
  t = t.replace(/[()（）\[\]【】]/g, ' ').replace(/\s+/g, ' ').trim();
  if (!t) return '';
  // 依標點切段，去除「連續重複」的段落
  const segs = t.split(/(?<=[。！？!?，,、\s])/).map(s => s.trim()).filter(Boolean);
  const out = [];
  for (const s of segs) {
    const norm = s.replace(/[。！？!?，,、\s]/g, '');
    const lastNorm = out.length ? out[out.length - 1].replace(/[。！？!?，,、\s]/g, '') : null;
    if (norm && norm === lastNorm) continue;  // 連續重複 → 跳過
    out.push(s);
  }
  let result = out.join('').trim();

  const compact = result.replace(/[。！？!?，,、\s]/g, '');
  // (A) 整串為同一短語精確重複拼接
  for (let len = 2; len <= Math.floor(compact.length / 2); len++) {
    if (compact.length % len === 0) {
      const unit = compact.slice(0, len);
      if (unit.repeat(compact.length / len) === compact && compact.length / len >= 2) {
        return unit;
      }
    }
  }
  // (B) 前綴重複偵測（容許尾端不完整）：找最短重複單元，出現 >=3 次即視為幻覺
  for (let len = 2; len <= Math.floor(compact.length / 3); len++) {
    const unit = compact.slice(0, len);
    let count = 0, pos = 0;
    while (compact.startsWith(unit, pos)) { count++; pos += len; }
    // 整串幾乎都由這個單元重複組成（覆蓋 >85%）且重複 >=3 次
    if (count >= 3 && pos / compact.length > 0.85) {
      return unit;
    }
  }
  return result;
}

// 【v11】裁掉頭尾靜音（正規化後閾值 0.01），保留 0.1s 邊界
function trimSilence(pcm, thresh = 0.01) {
  let s = 0, e = pcm.length - 1;
  while (s < e && Math.abs(pcm[s]) < thresh) s++;
  while (e > s && Math.abs(pcm[e]) < thresh) e--;
  const pad = 1600;  // 0.1s @16kHz
  s = Math.max(0, s - pad); e = Math.min(pcm.length - 1, e + pad);
  return pcm.slice(s, e + 1);
}

// 【智能降級】自動嘗試所有方案（統一轉 16kHz WAV，格式全平台相容）
async function recognizeWithFallback(audioBase64, blob) {
  console.log('開始辨識...優先順序: Gemini (3 key) → Whisper');
  const errors = [];
  let pcm = null;

  // 先統一轉成 16kHz 正規化 PCM（Gemini 與 Whisper 共用）
  try {
    pcm = await blobToPcm16kWithNormalization(blob);
  } catch (e) {
    return { text: '', source: 'None', success: false, error: '音訊解碼失敗: ' + e.message };
  }
  // 【v11】裁掉頭尾靜音
  pcm = trimSilence(pcm);
  // 【v11】低音量偵測（原始峰值 < 0.02 ≈ -34dB，正常說話應 > 0.1）
  const lowVolume = lastRawPeak < 0.02;
  // 【v11】有效語音過短 → 直接失敗並提示
  if (pcm.length < 16000 * 0.3) {
    return { text: '', source: 'None', success: false,
      error: lowVolume ? '錄音音量過低,幾乎收不到聲音,請靠近麥克風大聲一點' : '有效語音過短,請重新錄製' };
  }
  // 【診斷】實際解碼出的音訊長度（若遠短於錄音時間 = 音訊被截斷）
  const duration = (pcm.length / 16000).toFixed(1);

  // 【第 1 層】Gemini：轉 WAV 再送（webm/mp4 非 Gemini 支援格式，是先前亂辨識主因）
  try {
    console.log(`嘗試 Gemini API (WAV 格式, ${duration}s)...`);
    const wavBase64 = 'data:audio/wav;base64,' + pcm16kToWavBase64(pcm);
    const text = dedupeRepeats(filterHallucination(await recognizeWithGemini(wavBase64, 'audio/wav')));
    if (text) return { text, source: 'Gemini', success: true, duration, lowVolume, poorQuality: lastSnrDb < 8, pcm };
    errors.push('Gemini: 回傳空白（可能無語音內容）');
  } catch (geminiErr) {
    console.warn('Gemini 全部失敗:', geminiErr.message);
    errors.push('Gemini: ' + geminiErr.message);
    API_CONFIG.stats.failedAttempts++;
  }

  // 【第 2 層】本機 Whisper（完全離線，改跑 Web Worker 不卡畫面）
  try {
    console.log('嘗試本機 Whisper (Worker)...');
    const rawText = await whisperWorkerTranscribe(pcm);
    API_CONFIG.stats.whisper++;
    const text = dedupeRepeats(filterHallucination(rawText));
    // 【改動】即使 Whisper 成功，也帶回 Gemini 失敗原因供畫面顯示
    if (text) return { text, source: 'Whisper', success: true, duration, lowVolume, poorQuality: lastSnrDb < 8, geminiError: errors[0] || '', pcm };
    errors.push('Whisper: 未辨識到有效文字');
  } catch (whisperErr) {
    console.error('Whisper 失敗:', whisperErr.message);
    errors.push('Whisper: ' + whisperErr.message);
  }

  return { text: '', source: 'None', success: false, error: errors.join(' | ') + `（音訊 ${duration}s）`, poorQuality: lastSnrDb < 8, pcm };
}
